name: Update Version

on:
  repository_dispatch:
    types: [update-version]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update latest-version.json
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          jq --arg v "$VERSION" \
             --arg win "https://github.com/Raudue/multiprompter/releases/download/v${VERSION}/SealTerminal-Setup.exe" \
             --arg mac "https://github.com/Raudue/multiprompter/releases/download/v${VERSION}/SealTerminal-darwin-x64.zip" \
             '.version = $v | .windowsUrl = $win | .macUrl = $mac' \
             data/latest-version.json > data/latest-version.tmp.json
          mv data/latest-version.tmp.json data/latest-version.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest-version.json
          git commit -m "chore: bump version to ${{ github.event.client_payload.version }}"
          git push
